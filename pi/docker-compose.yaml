version: "3.8"

services:
  nats:
    image: nats:latest
    container_name: nats-server
    ports:
      - "1883:1883" # MQTT client connections
      - "4222:4222" # NATS Client connections
      - "6222:6222" # Routes
      - "8222:8222" # Monitoring
    command: "-c /nats.conf"
    volumes:
      - ~/jetstream-data:/tmp/nats/jetstream
      - ./nats.conf:/nats.conf:ro
